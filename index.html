<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Generator</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="container">
      <h1>Password Generator</h1>
      <div class="password-container">
        <input type="text" readonly id="password" />
        <i class="far fa-copy" id="copy-btn" title="Copy to clipboard"></i>
      </div>
      <!-- options-->
      <div class="options">
        <div class="option">
          <label for="lenght">Password Lenght</label>
          <div class="range-container">
            <input type="range" id="lenght" min="6" max="24" value="12" />
            <span id="lenght-value">12</span>
          </div>
        </div>
        <div class="option">
          <label for="uppercase">Include Uppercase</label>
          <input type="checkbox" id="uppercase" checked />
        </div>

        <div class="option">
          <label for="lowerscase">Include Lowerscase</label>
          <input type="checkbox" id="lowerscase" checked />
        </div>

        <div class="option">
          <label for="number">Include Number</label>
          <input type="checkbox" id="number" checked />
        </div>

        <div class="option">
          <label for="symbols">Include Symbols</label>
          <input type="checkbox" id="symbols" checked />
        </div>
      </div>

      <button><i class="fas fa-key"></i> Generator Password</button>

      <div class="strength-container">
        <p>Password Strength: <span id="strength-label">Medium</span></p>
        <div class="strength-meter">
          <div class="strength-bar"></div>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
